<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/layouts/layout.css">
    <title>Funcionários – Cars Scheduling</title>
</head>

<body>

    <img src="../../img/6407367.jpg" class="fundo-fixo" alt="fundo">

    <header>
        <nav>
            <a class="link-header" href="../index/index.html">Home</a>
            <a class="link-header" href="../servico/servico.html">Serviços</a>
            <a class="link-header" href="funcionario.html">Funcionários</a>
            <a class="link-header" href="../cliente/cliente.html">Clientes</a>
            <a class="link-header" href="../ordem/ordem.html">Agendamentos</a>
            <button class="btn-header" onclick="window.location.href='../login/login.html'">Login</button>
        </nav>
    </header>

    <div class="page-container">

        <div class="action-bar">
            <h1>Funcionários</h1>
            <button class="btn btn-gold" onclick="document.getElementById('form-section').style.display='block'">
                + Novo Funcionário
            </button>
        </div>

        <!-- Formulário de cadastro -->
        <div class="card" id="form-section" style="display:none;">
            <h2>Cadastrar Funcionário</h2>
            <form class="form-group">
                <label>Nome</label>
                <input type="text" placeholder="Nome completo">

                <label>Telefone</label>
                <input type="tel" placeholder="(99) 99999-9999">

                <label>Email</label>
                <input type="email" placeholder="funcionario@email.com">

                <label>Salário (R$)</label>
                <input type="number" placeholder="0,00">

                <label>Data de entrada</label>
                <input type="datetime-local">

                <label>Data de nascimento</label>
                <input type="date">

                <label>Cargo / Função</label>
                <input type="text" placeholder="Ex: Polidor, Mecânico...">

                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button type="submit" class="btn btn-gold">Salvar</button>
                    <button type="button" class="btn btn-outline"
                        onclick="document.getElementById('form-section').style.display='none'">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Listagem -->
        <div class="card">
            <h2>Lista de Funcionários</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="empty-msg">Nenhum funcionário cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</body>

</html>
