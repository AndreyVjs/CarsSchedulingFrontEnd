<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global/layouts/layout.css">
    <title>Clientes – Cars Scheduling</title>
</head>

<body>

    <img src="../../img/6407367.jpg" class="fundo-fixo" alt="fundo">

    <header>
        <nav>
            <a class="link-header" href="../index/index.html">Home</a>
            <a class="link-header" href="../servico/servico.html">Serviços</a>
            <a class="link-header" href="../funcionario/funcionario.html">Funcionários</a>
            <a class="link-header" href="cliente.html">Clientes</a>
            <a class="link-header" href="../ordem/ordem.html">Agendamentos</a>
            <button class="btn-header" onclick="window.location.href='../login/login.html'">Login</button>
        </nav>
    </header>

    <div class="page-container">

        <!-- Título + botão abrir formulário -->
        <div class="action-bar">
            <h1>Clientes</h1>
            <button class="btn btn-gold" onclick="document.getElementById('form-section').style.display='block'">
                + Novo Cliente
            </button>
        </div>

        <!-- Formulário de cadastro (oculto por padrão) -->
        <div class="card" id="form-section" style="display:none;">
            <h2>Cadastrar Cliente</h2>
            <form class="form-group">
                <label>Nome</label>
                <input oninput="validarCampo()" type="text" placeholder="Nome completo" id="name-customer-input">

                <label>Telefone</label>
                <input oninput="validarCampo()" type="tel" placeholder="(99) 99999-9999" id="cellphone-customer-input">

                <label>Email</label>
                <input oninput="validarCampo()" type="email" placeholder="cliente@email.com" id="email-customer-input">

                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button type="submit" class="btn btn-gold" id="button-customer-input">Salvar</button>
                    <button type="button" class="btn btn-outline"
                        onclick="document.getElementById('form-section').style.display='none'">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Listagem de clientes -->
        <div class="card">
            <h2>Lista de Clientes</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Linhas geradas pelo JavaScript -->
                    <tr>
                        <td colspan="5" class="empty-msg">Nenhum cliente cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="ClienteScript.js" type="module"></script>
</body>

</html>
