<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global/layouts/layout.css">
    <title>Login – Cars Scheduling</title>
</head>
<body>

    <img src="../../img/6407367.jpg" class="fundo-fixo" alt="fundo">

    <header>
        <nav>
            <a class="link-header" href="../index/index.html">Home</a>
        </nav>
    </header>

    <div class="page-container" style="max-width:460px; margin-top:80px;">

            <h2 style="text-align:center; font-size:1.6rem;">Cars Scheduling</h2>
            <p style="text-align:center; color:#aaa; margin-bottom:24px;">Entre com sua conta</p>

            <form class="form-group">

                <button type="submit" class="btn btn-gold" style="margin-top:8px;">Entrar</button>

                <a href="esqueci-senha.html" style="color:goldenrod; text-align:center; font-size:0.85rem; margin-top:4px;">

        </div>
    </div>
