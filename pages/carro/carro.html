<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/layouts/layout.css">
    <title>Carros do Cliente – Cars Scheduling</title>
</head>

<body>

    <img src="../../img/6407367.jpg" class="fundo-fixo" alt="fundo">

    <header>
        <nav>
            <a class="link-header" href="../index/index.html">Home</a>
            <a class="link-header" href="../servico/servico.html">Serviços</a>
            <a class="link-header" href="../funcionario/funcionario.html">Funcionários</a>
            <a class="link-header" href="../cliente/cliente.html">Clientes</a>
            <a class="link-header" href="../ordem/ordem.html">Agendamentos</a>
            <button class="btn-header" onclick="window.location.href='../login/login.html'">Login</button>
        </nav>
    </header>

    <div class="page-container">

        <!-- Cabeçalho da página com o nome do cliente carregado via JS -->
        <div class="action-bar">
            <div>
                <a href="../cliente/cliente.html" style="color:goldenrod; font-size:0.85rem;">← Voltar aos clientes</a>
                <h1 style="margin-top:6px;">Carros do Cliente</h1>
                <p style="color:#aaa; font-size:0.9rem;">Nome do cliente aparecerá aqui</p>
            </div>
            <button class="btn btn-gold" onclick="document.getElementById('form-section').style.display='block'">
                + Novo Carro
            </button>
        </div>

        <!-- Formulário de cadastro -->
        <div class="card" id="form-section" style="display:none;">
            <h2>Cadastrar Carro</h2>
            <form class="form-group">
                <label>Nome / Modelo</label>
                <input type="text" placeholder="Ex: Civic, Corolla...">

                <label>Marca</label>
                <input type="text" placeholder="Ex: Honda, Toyota...">

                <label>Cor</label>
                <input type="text" placeholder="Ex: Prata, Preto...">

                <label>Placa</label>
                <input type="text" placeholder="AAA-0000">

                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button type="submit" class="btn btn-gold">Salvar</button>
                    <button type="button" class="btn btn-outline"
                        onclick="document.getElementById('form-section').style.display='none'">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Listagem -->
        <div class="card">
            <h2>Carros cadastrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Modelo</th>
                        <th>Marca</th>
                        <th>Cor</th>
                        <th>Placa</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="empty-msg">Nenhum carro cadastrado para este cliente.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</body>

</html>
