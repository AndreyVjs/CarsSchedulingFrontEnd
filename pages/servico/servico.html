<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global/layouts/layout.css">
    <title>Serviços – Cars Scheduling</title>
</head>

<body>

    <img src="../../img/6407367.jpg" class="fundo-fixo" alt="fundo">

    <header>
        <nav>
            <a class="link-header" href="../index/index.html">Home</a>
            <a class="link-header" href="servico.html">Serviços</a>
            <a class="link-header" href="../funcionario/funcionario.html">Funcionários</a>
            <a class="link-header" href="../cliente/cliente.html">Clientes</a>
            <a class="link-header" href="../ordem/ordem.html">Agendamentos</a>
            <button class="btn-header" onclick="window.location.href='../login/login.html'">Login</button>
        </nav>
    </header>

    <div class="page-container">

        <div class="action-bar">
            <h1>Serviços</h1>
            <button class="btn btn-gold" onclick="document.getElementById('form-section').style.display='block'">
                + Novo Serviço
            </button>
        </div>

        <!-- Formulário de cadastro -->
        <div class="card" id="form-section" style="display:none;">
            <h2>Cadastrar Serviço</h2>
            <form class="form-group">
                <label>Nome do serviço</label>
                <input id="name-input-servico" type="text" placeholder="Ex: Lavagem completa, Polimento...">

                <label>Descrição</label>
                <input id="description-input-servico" type="text" placeholder="Breve descrição do serviço">

                <label>Preço (R$)</label>
                <input id="price-input-servico" type="number" placeholder="0,00">

                <label>Tempo estimado</label>
                <input id="estimated-time-input-servico" type="text" placeholder="Ex: 2 horas, 30 minutos...">

                <label>Funcionário responsável</label>
                <select>
                    <option value="">Selecione um funcionário</option>
                    <!-- Opções geradas pelo JavaScript -->
                </select>

                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button type="submit" class="btn btn-gold">Salvar</button>
                    <button type="button" class="btn btn-outline"
                        onclick="document.getElementById('form-section').style.display='none'">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Listagem -->
        <div class="card">
            <h2>Lista de Serviços</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Tempo</th>
                        <th>Funcionário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" class="empty-msg">Nenhum serviço cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="servico.js" type="module"></script>
</body>

</html>
